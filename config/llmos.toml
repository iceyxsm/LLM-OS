[daemon]
name = "llmd"
listen = "127.0.0.1:7000"

[model]
# Backend: "mock" or "llama-cpp"
backend = "mock"
# Path to GGUF model file (required for llama-cpp backend)
model_path = ""
# Human-readable model name
name = "none"
# Context length in tokens
context_length = 4096
# GPU layers to offload (0 = CPU only)
gpu_layers = 0
# CPU threads for inference
threads = 4
# Quantization format
quantization = "Q4_K_M"

[policy]
endpoint = "http://127.0.0.1:50051"
timeout_secs = 2
max_attempts = 3
backoff_initial_ms = 100
backoff_max_ms = 1000
breaker_threshold = 3
breaker_cooldown_secs = 5
health_interval_secs = 30

[audit]
# Sink: "stdout", "jsonl", or "bus"
sink = "stdout"
# Path for JSONL sink (only used when sink = "jsonl")
jsonl_path = ""
rotate_max_bytes = 10485760
rotate_max_files = 5

[metrics]
listen = "127.0.0.1:9090"

[security]
default_policy = "config/policy.example.yaml"

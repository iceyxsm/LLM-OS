global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: llmd
    static_configs:
      - targets: ["host.docker.internal:9090"]

  - job_name: policy_engine
    static_configs:
      - targets: ["host.docker.internal:9091"]
